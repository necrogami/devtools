# ~/.tmux.conf — sensible defaults for ssh+docker exec workflows.

# Full 24-bit colour so oh-my-posh glyphs + themes render correctly.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# History & responsiveness.
set -g history-limit 50000
set -sg escape-time 0
set -g mouse on
set -g focus-events on

# Start counting from 1 and renumber windows after close.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Ctrl-a prefix (easier reach than Ctrl-b, doesn't conflict with vim).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config on demand.
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# Splits that inherit cwd.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status line.
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g status-left  "#[bold]#S "
set -g status-right "#{?client_prefix,#[reverse]PREFIX #[noreverse] ,}#H  %Y-%m-%d %H:%M"
