name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Unit tests (with race detector + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -30
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "::notice title=Coverage::Total coverage: ${total}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Cross-compile matrix
        run: |
          set -e
          for os in linux darwin; do
              for arch in amd64 arm64; do
                  echo ">>> building $os/$arch"
                  GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                      go build -trimpath -ldflags "-s -w" \
                      -o /tmp/dev-$os-$arch ./cmd/dev
              done
          done
          ls -la /tmp/dev-*
