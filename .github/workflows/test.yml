name: test

# Run tests only when Go code, Go deps, or this workflow itself changes.
# Everything else (README, SPEC, LICENSE, issue/PR templates, Dockerfile,
# install scripts, compose template, install.sh, release workflows) is
# either validated by a different workflow or doesn't influence test
# outcomes, so we skip the compute.
#
# `paths:` is an allow-list — the workflow runs only when at least one
# changed file matches a listed pattern.
on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JavaScript actions; silences the deprecation banner
# GH added in Sep 2025. Safe to remove once all actions we use ship
# Node-24 defaults.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Unit tests (with race detector + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -30
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "::notice title=Coverage::Total coverage: ${total}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Cross-compile matrix
        run: |
          set -e
          for os in linux darwin; do
              for arch in amd64 arm64; do
                  echo ">>> building $os/$arch"
                  GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                      go build -trimpath -ldflags "-s -w" \
                      -o /tmp/dev-$os-$arch ./cmd/dev
              done
          done
          ls -la /tmp/dev-*
