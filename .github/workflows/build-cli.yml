name: build-cli

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write   # GoReleaser needs this to create the GitHub Release.
  packages: write

concurrency:
  group: build-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog.

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
