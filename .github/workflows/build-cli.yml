name: build-cli

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write   # GoReleaser needs this to create the GitHub Release.
  packages: write

concurrency:
  group: build-cli-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JavaScript actions; silences the deprecation banner
# GH added in Sep 2025. Safe to remove once all actions we use ship
# Node-24 defaults.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog.

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"       # pin to goreleaser v2.x rather than latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
