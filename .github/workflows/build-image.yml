name: build-image

on:
  push:
    branches: [main]
    paths:
      - base/**
      - .github/workflows/build-image.yml
  schedule:
    - cron: "0 6 * * 0"   # Sundays 06:00 UTC — rebuild to pick up upstream patches
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JavaScript actions; silences the deprecation banner
# GH added in Sep 2025. Safe to remove once all actions we use ship
# Node-24 defaults.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          date_tag=$(date -u +%Y-%m-%d)
          sha_tag=sha-${GITHUB_SHA::7}
          echo "date=${date_tag}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha_tag}"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/necrogami/devtools:latest
            ghcr.io/necrogami/devtools:${{ steps.tags.outputs.date }}
            ghcr.io/necrogami/devtools:${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (amd64)
        run: |
          docker pull --platform linux/amd64 ghcr.io/necrogami/devtools:${{ steps.tags.outputs.sha }}
          IMAGE=ghcr.io/necrogami/devtools:${{ steps.tags.outputs.sha }} \
            ./base/smoke-test.sh
